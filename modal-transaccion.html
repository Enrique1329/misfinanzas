<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Agregar Transacción — Mockup</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', -apple-system, sans-serif; background:#FAFAF8; color:#1A1A1A; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- Fondo difuminado simulando overlay de modal -->
  <div class="fixed inset-0 bg-black/30 backdrop-blur-sm"></div>

  <!-- MODAL -->
  <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">

    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-bold">Nueva transacción</h2>
      <button class="text-gray-400 hover:text-gray-900 text-lg">✕</button>
    </div>

    <!-- TOGGLE TIPO -->
    <div class="flex bg-gray-100 rounded-xl p-1 mb-5">
      <button class="flex-1 py-2 rounded-lg bg-white shadow-sm text-sm font-semibold text-[#EF4444]">Gasto</button>
      <button class="flex-1 py-2 rounded-lg text-sm font-medium text-gray-500">Ingreso</button>
    </div>

    <!-- MONTO -->
    <label class="block text-sm font-medium mb-1">Monto</label>
    <div class="relative mb-1">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">$</span>
      <input type="number" step="0.01" placeholder="0.00" value="-15"
        class="w-full pl-7 pr-3 py-2.5 rounded-lg border border-red-400 text-sm focus:outline-none focus:ring-2 focus:ring-red-400" />
    </div>
    <p class="text-xs text-red-500 mb-4">El monto debe ser mayor a $0.00</p>

    <!-- CATEGORÍA -->
    <label class="block text-sm font-medium mb-1">Categoría</label>
    <select class="w-full px-3 py-2.5 rounded-lg border border-gray-200 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-gray-900">
      <option value="">Selecciona una categoría</option>
      <option>🍔 Comida</option>
      <option>🚗 Transporte</option>
      <option>🎮 Entretenimiento</option>
      <option>📦 Otros</option>
    </select>

    <!-- FECHA -->
    <label class="block text-sm font-medium mb-1">Fecha</label>
    <input type="date" value="2026-06-28"
      class="w-full px-3 py-2.5 rounded-lg border border-gray-200 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-gray-900" />

    <!-- NOTA -->
    <label class="block text-sm font-medium mb-1">Nota <span class="text-gray-400 font-normal">(opcional)</span></label>
    <input type="text" placeholder="Ej: Almuerzo con cliente" maxlength="100"
      class="w-full px-3 py-2.5 rounded-lg border border-gray-200 text-sm mb-6 focus:outline-none focus:ring-2 focus:ring-gray-900" />

    <!-- ACCIONES -->
    <div class="flex gap-2">
      <button class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm font-medium hover:bg-gray-50">Cancelar</button>
      <button class="flex-1 px-4 py-2.5 rounded-xl bg-gray-900 text-white text-sm font-medium opacity-50 cursor-not-allowed">Guardar</button>
    </div>

    <p class="text-xs text-gray-400 text-center mt-3">El botón "Guardar" se activa solo cuando todos los campos son válidos.</p>

  </div>

</body>
</html>
